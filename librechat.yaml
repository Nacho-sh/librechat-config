version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "Llama.cpp"
      apiKey: "nacho"
      baseURL: "http://host.docker.internal:8004/"
      models:
        default: ["llama3:latest", "command-r", "mixtral", "phi3"]
        fetch: true
      titleConvo: true
      titleModel: "current_model"

memory:
  disabled: false
  personalize: true
  tokenLimit: 1500
  messageWindowSize: 4
  validKeys:
    - "preferences"
    - "ongoing_projects"
    - "facts"
    - "context"
  agent:
    provider: "Llama.cpp"
    model: "current_model"
    instructions: |
      Extract and store only explicitly stated facts, preferences, and ongoing context.
      Do not store trivial or ephemeral information.
      Delete entries that have been corrected or superseded.
      Be concise. Each value should be a short sentence or a list of short items.
    model_parameters:
      temperature: 0.2


mcpSettings:
  allowedDomains:
    - "mcp-filesystem"
    - "mcp-code"
    - "mcp-fetch"

webSearch:
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  searchProvider: "searxng"
  tavilyApiKey: "${TAVILY_API_KEY}"
  scraperProvider: "tavily"
  rerankerType: "jina"
  jinaApiKey: "${JINA_API_KEY}"
  safeSearch: 1

mcpServers:
  filesystem:
    url: http://mcp-filesystem:8006/mcp
    type: streamable-http
    chatMenu: true

  code:
    url: http://mcp-code:8008/mcp
    type: streamable-http
    chatMenu: true
    timeout: 30000

  fetch:
    url: http://mcp-fetch:8007/sse
    type: sse
    chatMenu: true
